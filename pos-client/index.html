<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="pos-container">
        <header>
            <div class="header-left">
                <div class="brand">
                    <span class="brand-icon">💳</span>
                    <span class="brand-name">POS Terminal</span>
                </div>
                <span id="comm-liveness" class="liveness-dot offline"></span>
            </div>
            <div id="connection-status" class="status-badge connecting">Connecting...</div>
        </header>

        <main>
            <!-- Display Screen -->
            <div id="display-screen" class="display-screen idle">

                <!-- Idle state -->
                <div id="state-idle" class="state-panel active">
                    <div class="idle-icon">🏧</div>
                    <div class="idle-title">Terminal Ready</div>
                    <div class="idle-subtitle">Waiting for payment request...</div>
                </div>

                <!-- Active transaction state -->
                <div id="state-active" class="state-panel">
                    <div class="transaction-info">
                        <div class="service-label">SERVICE</div>
                        <div id="pos-service-name" class="service-name">-</div>
                    </div>
                    <div class="price-display">
                        <span class="price-currency">$</span>
                        <span id="pos-price" class="price-amount">0.00</span>
                    </div>
                    <div id="pos-status-text" class="status-chip waiting">Waiting for Card</div>
                    <div id="pos-message" class="status-message">Please tap or insert your card</div>
                </div>

                <!-- Result state -->
                <div id="state-result" class="state-panel">
                    <div id="result-icon" class="result-icon">✓</div>
                    <div id="result-title" class="result-title">Payment Successful</div>
                    <div id="result-tx" class="result-tx"></div>
                </div>

            </div>

            <!-- Action Buttons -->
            <div class="controls">
                <button id="pay-btn" class="primary-btn" disabled>
                    <span class="btn-icon">📲</span>
                    Tap Card / Pay
                </button>
                <button id="reset-btn" class="secondary-btn">
                    <span class="btn-icon">↺</span>
                    Reset Terminal
                </button>
            </div>
        </main>

        <section class="log-section">
            <h2>Activity Log</h2>
            <div id="log-container" class="log-container"></div>
        </section>
    </div>
    <script src="index.js"></script>
</body>

</html>
