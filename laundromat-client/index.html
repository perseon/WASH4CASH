<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASH4CASH - Laundromat Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <header>
            <div class="header-left">
                <div class="logo">WASH<span>4</span>CASH</div>
                <div class="comm-indicator">
                    <span id="comm-dot" class="dot offline"></span>
                    <span id="comm-text">Offline</span>
                </div>
            </div>
            <nav>
                <button id="show-admin" class="nav-btn">Admin Panel</button>
            </nav>
        </header>

        <section id="machine-grid" class="machine-grid">
            <!-- Machines will be injected here -->
        </section>

        <section id="admin-panel" class="admin-panel hidden">
            <div class="admin-header">
                <h2>Admin Configuration</h2>
                <button id="hide-admin" class="close-btn">&times;</button>
            </div>
            <div class="admin-content">
                <div class="config-group">
                    <h3>Programs</h3>
                    <div id="program-list" class="program-list">
                        <!-- Programs injected here -->
                    </div>
                </div>
            </div>
        </section>

        <div id="modal-container" class="modal-container hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="modal-title">Select Program</h2>
                    <button id="close-modal" class="close-btn">&times;</button>
                </div>
                <div id="modal-content" class="modal-content">
                    <div id="program-options" class="options-grid">
                        <!-- Options injected here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="start-machine-btn" class="primary-btn" disabled>Start Machine</button>
                </div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
